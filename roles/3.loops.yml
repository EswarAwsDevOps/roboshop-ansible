- name: demo on loops
  hosts: localhost
  tasks:
    - name: Loop on List
      ansible.builtin.debug:
        msg: "fruit name - {{item}}"
      loop:
        - orange
        - apple
      - name: Loop on list of
        ansible.builtin.debub:
          msg: "fruit name - {{item}}""
       loop:
         - orange
         - apple